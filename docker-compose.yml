services:
  backend:
    build: ./backend
    container_name: mindmap-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////app/data/mindmap.db
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      ANTHROPIC_HAIKU_MODEL: ${ANTHROPIC_HAIKU_MODEL:-claude-haiku-4-5-20251001}
      ANTHROPIC_ROLLUP_MODEL: ${ANTHROPIC_ROLLUP_MODEL:-claude-opus-4-8}
      WHISPER_MODEL: ${WHISPER_MODEL:-large-v3}
      WHISPER_DEVICE: ${WHISPER_DEVICE:-cuda}
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-float16}
      HF_HOME: /models
    volumes:
      - mindmap_data:/app/data
      - mindmap_models:/models
    # Published on localhost only for direct API/docs access during debugging.
    # Tailnet traffic goes through the frontend nginx proxy on 8080.
    ports:
      - "127.0.0.1:8001:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build: ./frontend
    container_name: mindmap-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  mindmap_data:
  mindmap_models:
